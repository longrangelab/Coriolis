[platformio]
build_dir = C:\pio_builds\lora_shooting_build

[env:tbeam]
platform = espressif32
board = ttgo-t-beam
framework = arduino
monitor_speed = 115200
; No OTA anywhere in this project (flashed over USB only) and no SPIFFS/LittleFS
; usage (WebUI is served from a PROGMEM string). The board's default partition
; table reserves a second 1.25MB OTA slot we never use -- huge_app.csv drops
; that second slot and gives it to app0 instead: 1.25MB -> 3MB of app space on
; the same 4MB flash chip. NVS (used by the node for its saved node ID) still
; gets its usual small partition, untouched.
board_build.partitions = huge_app.csv
lib_deps = 
	adafruit/Adafruit SSD1306@^2.5.13
	adafruit/Adafruit GFX Library@^1.11.11
	olikraus/U8g2@^2.36.2
	adafruit/Adafruit MPU6050@^2.2.6
	adafruit/Adafruit BMP085 Library@^1.2.4
	lewisxhe/SensorLib@^0.2.4
	madhephaestus/ESP32Encoder@^0.11.7
	mikalhart/TinyGPSPlus@^1.1.0
	jgromes/RadioLib@^7.1.1
	https://github.com/lewisxhe/XPowersLib
	nanopb/Nanopb@^0.4.5
board_check = true

